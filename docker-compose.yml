services:
  mr-robot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mr-robot-agent
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      # Mount app directory for development (comment out for production)
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - pentesting
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  pentesting:
    driver: bridge
